name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Rust toolchain
        uses: actions/cache/restore@v4
        id: cache-rustup
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os }}-stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Save Rust toolchain cache
        if: always() && steps.cache-rustup.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os }}-stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: test-rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-rust-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

  frontend-tests:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache/restore@v4
        id: cache-node
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Save node_modules cache
        if: always() && steps.cache-node.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: TypeScript type check
        run: bunx tsc --noEmit
