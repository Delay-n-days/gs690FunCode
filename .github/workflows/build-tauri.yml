name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_CUSTOM_DOMAIN: "pub-634661256d2a40a5a022b824d51bf62d.r2.dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Rust cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install R2 upload tools
        run: npm install @aws-sdk/client-s3 @aws-sdk/s3-request-presigner

      # === R2 连通性测试 ===
      - name: Test R2 connectivity
        run: |
          node -e "
            const { S3Client, PutObjectCommand, GetObjectCommand } = require('@aws-sdk/client-s3');
            const { getSignedUrl } = require('@aws-sdk/s3-request-presigner');
            (async () => {
              const client = new S3Client({
                region: 'auto',
                endpoint: 'https://' + process.env.R2_ACCOUNT_ID + '.r2.cloudflarestorage.com',
                credentials: {
                  accessKeyId: process.env.R2_ACCESS_KEY_ID,
                  secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
                }
              });
              await client.send(new PutObjectCommand({
                Bucket: process.env.R2_BUCKET,
                Key: 'test-r2.txt',
                Body: 'ok',
                ContentType: 'text/plain'
              }));
              console.log('R2 upload test: OK');
              const url = await getSignedUrl(client, new GetObjectCommand({
                Bucket: process.env.R2_BUCKET,
                Key: 'test-r2.txt'
              }));
              console.log('Download URL: ' + url);
            })();
          "

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: tauri build

      - name: Upload exe to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gs690-funcode-terminal
          path: src-tauri/target/release/gs690-fun-code.exe

      # 上传 exe 到 R2（AWS SDK）
      - name: Upload exe to R2
        if: success()
        run: |
          node -e "
            const { S3Client, PutObjectCommand, GetObjectCommand } = require('@aws-sdk/client-s3');
            const { getSignedUrl } = require('@aws-sdk/s3-request-presigner');
            const fs = require('fs');
            (async () => {
              const client = new S3Client({
                region: 'auto',
                endpoint: 'https://' + process.env.R2_ACCOUNT_ID + '.r2.cloudflarestorage.com',
                credentials: {
                  accessKeyId: process.env.R2_ACCESS_KEY_ID,
                  secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
                }
              });
              const key = 'tauri-builds/gs690-funcode-terminal.exe';
              await client.send(new PutObjectCommand({
                Bucket: process.env.R2_BUCKET,
                Key: key,
                Body: fs.readFileSync('src-tauri/target/release/gs690-fun-code.exe'),
                ContentType: 'application/vnd.microsoft.portable-executable'
              }));
              const url = await getSignedUrl(client, new GetObjectCommand({
                Bucket: process.env.R2_BUCKET,
                Key: key
              }));
              console.log('Uploaded to R2');
              console.log('Download URL: ' + url);
            })();
          "

      - name: Save Rust cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
