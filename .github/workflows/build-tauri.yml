name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            next-${{ runner.os }}-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli

      - name: Build Tauri app
        run: tauri build

      - name: Upload exe to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gs690-funcode-terminal
          path: src-tauri/target/release/gs690-fun-code.exe