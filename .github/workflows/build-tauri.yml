name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_CUSTOM_DOMAIN: "pub-634661256d2a40a5a022b824d51bf62d.r2.dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          cache: true
          cache: true

      - name: Restore Rust cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: build-tauri-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: build-tauri-${{ runner.os }}-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun add -g @tauri-apps/cli

      - name: Build Tauri app
        run: tauri build

      - name: Upload exe to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gs690-funcode-terminal
          path: src-tauri/target/release/gs690-fun-code.exe

      - name: Save Rust cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: build-tauri-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
