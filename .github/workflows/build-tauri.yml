name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      R2_ACCOUNT_ID: "f561b82dbf51a88ffdad2808ebff59c7"
      R2_ACCESS_KEY_ID: "cb15bd80fad859a8d7c22231281e1bea"
      R2_SECRET_ACCESS_KEY: "f4703ccd61a12224aa835171c2b2afc0152a082d6d0aa6edcef3820f2f88bf07"
      R2_BUCKET: "hucos"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 恢复 Rust 缓存（restore 单独步骤，不受 build 结果影响）
      - name: Restore Rust cache
        uses: actions/cache/restore@v4
        id: rust-cache
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Install R2 upload tool
        run: npm install @aws-sdk/client-s3

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: tauri build

      # 上传 exe 到 GitHub Artifacts
      - name: Upload exe to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gs690-funcode-terminal
          path: src-tauri/target/release/gs690-funcode-terminal.exe

      # 上传 exe 到 R2
      - name: Upload exe to R2
        if: success()
        run: node .github/scripts/upload-r2.js src-tauri/target/release/gs690-funcode-terminal.exe tauri-builds/gs690-funcode-terminal.exe

      # 保存 Rust 缓存（always，编译失败也保存，下次不用从头来）
      - name: Save Rust cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
