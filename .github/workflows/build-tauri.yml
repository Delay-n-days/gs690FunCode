name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      R2_ACCOUNT_ID: "f561b82dbf51a88ffdad2808ebff59c7"
      R2_ACCESS_KEY_ID: "cb15bd80fad859a8d7c22231281e1bea"
      R2_SECRET_ACCESS_KEY: "f4703ccd61a12224aa835171c2b2afc0152a082d6d0aa6edcef3820f2f88bf07"
      R2_BUCKET: "hucos"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Rust 依赖缓存（编译项目本身）
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      # Tauri CLI 直接 npm 装，11 秒，不用编译
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      # 前端打包成静态文件（out/ 目录）
      - name: Build Frontend
        run: npx next build

      # 编译 Tauri Windows exe
      - name: Build Tauri
        run: npx tauri build

      # 上传 NSIS 安装包到 GitHub Artifacts
      - name: Upload installer to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gs690-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # 上传 exe 到 R2（直链下载）
      - name: Upload exe to R2
        shell: pwsh
        run: |
          $exe = (Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1).FullName
          if ($exe) {
            node upload-r2.js $exe tauri-builds/gs690-funcode.exe
          } else {
            Write-Error "No .exe found in NSIS bundle"
            exit 1
          }
