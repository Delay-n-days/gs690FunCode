name: Build Tauri (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install R2 upload dependencies
        run: npm install @aws-sdk/client-s3

      # === 阶段零：测试 R2 连通性 ===

      - name: Test R2 connectivity
        run: |
          echo "test" > test-r2.txt
          node upload-r2.js test-r2.txt ci-ping/test.txt
          del test-r2.txt

      # === 阶段一：获取 cargo-tauri.exe ===

      - name: Download cargo-tauri.exe from R2
        id: download-cli
        continue-on-error: true
        shell: pwsh
        run: |
          node upload-r2.js --check tauri-cli/cargo-tauri-windows-x64.exe
          Invoke-WebRequest -Uri "https://pub-634661256d2a40a5a022b824d51bf62d.r2.dev/tauri-cli/cargo-tauri-windows-x64.exe" -OutFile "$HOME\.cargo\bin\cargo-tauri.exe"
          Write-Host "Downloaded cargo-tauri.exe from R2"

      - name: Cache restore cargo-tauri.exe
        if: steps.download-cli.outcome == 'failure'
        uses: actions/cache/restore@v4
        with:
          key: tauri-cli-${{ runner.os }}-${{ runner.arch }}
          path: C:\Users\runneradmin\.cargo\bin\cargo-tauri.exe
          fail-on-cache-miss: false
          lookup-only: false
        id: cache-cli

      - name: Verify tauri-cli
        id: verify-cli
        continue-on-error: true
        shell: pwsh
        run: |
          $tauriPath = "$HOME\.cargo\bin\cargo-tauri.exe"
          if (Test-Path $tauriPath) {
            Write-Host "Found cargo-tauri.exe at $tauriPath"
            cargo tauri --version
          } else {
            Write-Host "cargo-tauri.exe not found"
            exit 1
          }

      # === 阶段二：编译 tauri-cli（仅首次） ===

      - name: Install Tauri CLI
        if: steps.verify-cli.outcome == 'failure'
        run: cargo install tauri-cli

      - name: Upload cargo-tauri.exe to R2
        if: steps.verify-cli.outcome == 'failure'
        shell: pwsh
        run: |
          $src = "$HOME\.cargo\bin\cargo-tauri.exe"
          $dst = "cargo-tauri-windows-x64.exe"
          Copy-Item $src $dst
          node upload-r2.js $dst tauri-cli/cargo-tauri-windows-x64.exe
          Remove-Item $dst

      - name: Cache save cargo-tauri.exe
        if: steps.verify-cli.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          key: tauri-cli-${{ runner.os }}-${{ runner.arch }}
          path: C:\Users\runneradmin\.cargo\bin\cargo-tauri.exe

      # === 阶段三：构建 Tauri 应用 ===

      - name: Build Tauri (release)
        run: cargo tauri build

      # === 阶段四：上传产物 ===

      - name: Upload installer to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gs690-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload exe to R2
        shell: pwsh
        run: |
          $exe = (Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1).FullName
          if ($exe) {
            node upload-r2.js $exe tauri-builds/gs690-funcode.exe
          } else {
            Write-Error "No .exe found in NSIS bundle"
            exit 1
          }
